<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MMA Career Manager MVP</title>
    <script type="module" src="/src/main.js"></script>
    <style>
      :root {
        --bg: #111827;
        --text: #f3f4f6;
        --muted: #9ca3af;
        --card: #1f2937;
        --control-bg: #374151;
        --control-border: #4b5563;
      }
      body.light {
        --bg: #f9fafb;
        --text: #111827;
        --muted: #4b5563;
        --card: #ffffff;
        --control-bg: #f3f4f6;
        --control-border: #d1d5db;
      }
      body { font-family: Inter, Arial, sans-serif; margin:0; background:var(--bg); color:var(--text); }
      .app { max-width: 1100px; margin: 0 auto; padding: 20px; }
      .grid { display:grid; grid-template-columns: 1fr 1fr; gap:16px; }
      .card { background:var(--card); border-radius:8px; padding:16px; }
      h1,h2,h3 { margin-top:0; }
      button, select, input { background:var(--control-bg); color:var(--text); border:1px solid var(--control-border); border-radius:6px; padding:8px; }
      button { cursor:pointer; }
      .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:8px; }
      .small { color:var(--muted); font-size: 0.9rem; }
      ul { padding-left: 18px; }
      .full { grid-column: 1 / -1; }
      .topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
    </style>
  </head>
  <body><div id="app" class="app"></div></body>
</html>
