<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MMA Career Manager MVP</title>
    <script type="module" src="/src/main.js"></script>
    <style>
      body { font-family: Inter, Arial, sans-serif; margin:0; background:#111827; color:#f3f4f6; }
      .app { max-width: 1100px; margin: 0 auto; padding: 20px; }
      .grid { display:grid; grid-template-columns: 1fr 1fr; gap:16px; }
      .card { background:#1f2937; border-radius:8px; padding:16px; }
      h1,h2,h3 { margin-top:0; }
      button, select, input { background:#374151; color:#f3f4f6; border:1px solid #4b5563; border-radius:6px; padding:8px; }
      button { cursor:pointer; }
      .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:8px; }
      .small { color:#9ca3af; font-size: 0.9rem; }
      ul { padding-left: 18px; }
      .full { grid-column: 1 / -1; }
    </style>
  </head>
  <body><div id="app" class="app"></div></body>
</html>
